<!DOCTYPE html>
<html lang="en" id="html" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth — Keyrouter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161f; --surface-2: #1a1e2a; --surface-3: #222637;
      --border: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.12);
      --text: #dde1ed; --text-muted: #525870; --text-dim: #363b52;
      --accent: #f59e0b; --accent-dim: rgba(245,158,11,0.12); --accent-glow: rgba(245,158,11,0.25);
      --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --orange: #f97316; --orange-dim: rgba(249,115,22,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --radius: 6px; --radius-lg: 10px;
    }
    html:not(.dark) {
      --bg: #f0f0eb; --surface: #ffffff; --surface-2: #f7f7f3; --surface-3: #ededea;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.14);
      --text: #1a1c24; --text-muted: #8892a4; --text-dim: #bcc1cc;
      --accent: #d97706; --accent-dim: rgba(217,119,6,0.10); --accent-glow: rgba(217,119,6,0.20);
    }
    body { font-family: 'JetBrains Mono','Courier New',monospace; background: var(--bg); color: var(--text); font-size: 12.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); height: 48px; display: flex; align-items: center; padding: 0 1rem; flex-shrink: 0; z-index: 10; gap: 0; }
    .logo { display: flex; align-items: center; gap: 0.45rem; text-decoration: none; color: var(--text); flex-shrink: 0; margin-right: 1rem; }
    .logo-mark { width: 20px; height: 20px; background: var(--accent); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #000; }
    .logo-name { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; }
    nav { display: flex; align-items: stretch; height: 100%; flex: 1; }
    .nav-link { display: flex; align-items: center; gap: 0.3rem; padding: 0 0.75rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.03em; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-link svg { flex-shrink: 0; opacity: 0.7; }
    .nav-link.active svg { opacity: 1; }
    .hdr-actions { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .hdr-btn { border: 1px solid var(--border-mid); background: transparent; color: var(--text-muted); font-family: inherit; font-size: 0.68rem; font-weight: 500; padding: 0.28rem 0.6rem; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none; }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page { flex: 1; overflow-y: auto; padding: 2rem; max-width: 720px; width: 100%; margin: 0 auto; }
    .section-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; border: 1px solid var(--border-mid); background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 0.72rem; font-weight: 500; padding: 0.32rem 0.8rem; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
    .btn:hover:not(:disabled) { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn.primary:hover:not(:disabled) { opacity: 0.88; }
    .btn.danger:hover:not(:disabled) { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .chip { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.15rem 0.45rem; border-radius: 99px; border: 1px solid transparent; }
    .chip.ok { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .chip.warn { background: var(--orange-dim); color: var(--orange); border-color: rgba(249,115,22,0.2); }
    .chip.error { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.2); }
    .chip.info { background: var(--accent-dim); color: var(--accent); border-color: rgba(245,158,11,0.2); }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .chip.ok .dot { background: var(--green); }
    .chip.warn .dot { background: var(--orange); }
    .chip.error .dot { background: var(--red); }
    .chip.info .dot { background: var(--accent); }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border-mid); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 480px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.5); animation: modal-in 0.18s ease; }
    @keyframes modal-in { from { opacity:0; transform:scale(0.96) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
    .modal-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .modal-code { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.25em; background: var(--accent-dim); border: 1px solid var(--accent-glow); border-radius: var(--radius); padding: 0.6rem 1rem; display: inline-block; color: var(--accent); margin: 0.4rem 0; }
    .field-group { margin-bottom: 0.85rem; }
    .field-group label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 0.3rem; }
    .field-group input { width: 100%; background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: var(--radius); color: var(--text); padding: 0.5rem 0.75rem; font-family: inherit; font-size: 0.8rem; transition: border-color 0.15s; }
    .field-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .field-group input::placeholder { color: var(--text-dim); }
    .field-error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius); padding: 0.45rem 0.7rem; font-size: 0.75rem; color: var(--red); }
    .empty { color: var(--text-dim); font-size: 0.75rem; text-align: center; padding: 2rem; }
    .btn-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.78rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 200; max-width: 90vw; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    #toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }
    @media (max-width: 639px) { .page { padding: 1rem; } header { padding: 0 0.75rem; } .nav-label { display: none; } .logo-name { display: none; } }

    /* Auth-specific */
    .page-header { margin-bottom: 1.5rem; }
    .page-title { font-size: 1rem; font-weight: 700; }
    .page-subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }
    .account-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.15rem; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.15s; }
    .account-card.needs-auth { border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.03); }
    .account-card.expired { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.03); }
    .account-icon { width: 36px; height: 36px; border-radius: var(--radius); background: var(--surface-3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.72rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.04em; }
    .account-info { flex: 1; min-width: 0; }
    .account-name { font-weight: 600; font-size: 0.82rem; color: var(--text); margin-bottom: 0.2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .account-detail { font-size: 0.68rem; color: var(--text-muted); }
    .account-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .provider-section { margin-bottom: 1.5rem; }
    .provider-header { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.6rem; padding: 0 0.1rem; }
  </style>
</head>
<body>

  <header>
    <a href="/dashboard" class="logo">
      <span class="logo-mark">K</span>
      <span class="logo-name">KEYROUTER</span>
    </a>
    <nav>
      <a href="/dashboard" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6.5L7.5 1L14 6.5V14H10V9.5H5V14H1V6.5Z" stroke-linejoin="round"/></svg>
        <span class="nav-label">Overview</span>
      </a>
      <a href="/dashboard/monitor" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,10 4,5 7,8.5 10,3 14,7"/></svg>
        <span class="nav-label">Monitor</span>
      </a>
      <a href="/dashboard/config" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="4" x2="14" y2="4"/><line x1="1" y1="11" x2="14" y2="11"/><circle cx="5" cy="4" r="2" fill="var(--bg)"/><circle cx="10" cy="11" r="2" fill="var(--bg)"/></svg>
        <span class="nav-label">Config</span>
      </a>
      <a href="/dashboard/auth" class="nav-link active">
        <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="6" r="3"/><path d="M8 8.5L13.5 14M11.5 11L13 12.5"/></svg>
        <span class="nav-label">Auth</span>
      </a>
      <a href="/dashboard/usage" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="3" height="5"/><rect x="6" y="6" width="3" height="8"/><rect x="11" y="3" width="3" height="11"/></svg>
        <span class="nav-label">Usage</span>
      </a>
    </nav>
    <div class="hdr-actions">
      <a href="https://github.com/canhta/keyrouter" target="_blank" class="hdr-btn" title="Star us on GitHub" aria-label="GitHub">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <button class="hdr-btn" id="dark-toggle" onclick="toggleDark()">☀</button>
      <button class="hdr-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="page">
    <div class="page-header">
      <div class="page-title">Auth &amp; Credentials</div>
      <div class="page-subtitle">Manage OAuth tokens and API keys for your provider accounts</div>
    </div>
    <div id="accounts-list"><div class="empty">Loading…</div></div>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal-backdrop" id="auth-modal">
    <div class="modal">
      <div class="modal-title">Authorize Provider</div>
      <p id="auth-step" style="color:var(--text-muted);font-size:0.78rem">Starting device flow…</p>
      <div id="auth-code-section" style="display:none">
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem">
          1. Open: <a id="auth-uri" href="#" target="_blank" style="color:var(--accent);font-weight:600;text-decoration:none"></a>
        </p>
        <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.5rem">2. Enter this code:</p>
        <div class="modal-code" id="auth-code"></div>
        <div class="btn-row" style="margin-top:1rem">
          <button class="btn primary" onclick="openAuthUri()">Open in Browser</button>
          <button class="btn" onclick="copyAuthCode()">Copy Code</button>
          <button class="btn danger" onclick="cancelAuth()">Cancel</button>
        </div>
        <p style="margin-top:1rem;font-size:0.72rem;color:var(--text-muted)">&#8987; Waiting for authorization…</p>
      </div>
      <div id="auth-result" style="display:none;font-size:0.82rem;font-weight:700"></div>
    </div>
  </div>

  <div id="toast"></div>

<script>
// ── Auth modal state ────────────────────────────────────────────────────────
let currentAuth = null

// ── Data loading ────────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const r = await fetch('/dashboard/api/status')
    if (!r.ok) throw new Error('Failed to load status')
    const d = await r.json()
    renderAccounts(d.accounts ?? {}, d.models ?? [])
  } catch (err) {
    document.getElementById('accounts-list').innerHTML =
      `<div class="empty">Failed to load accounts: ${err.message}</div>`
  }
}

// ── Render accounts ─────────────────────────────────────────────────────────
function renderAccounts(accounts, models) {
  const container = document.getElementById('accounts-list')
  const entries = Object.entries(accounts)

  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">No provider accounts configured.</div>'
    return
  }

  // Group by providerId
  const byProvider = {}
  for (const [accountId, acc] of entries) {
    const pid = acc.providerId ?? 'unknown'
    if (!byProvider[pid]) byProvider[pid] = []
    byProvider[pid].push({ accountId, ...acc })
  }

  let html = ''
  for (const [providerId, accs] of Object.entries(byProvider)) {
    html += `<div class="provider-section">`
    html += `<div class="provider-header">${providerId}</div>`

    for (const acc of accs) {
      const { accountId, hasCredential, tokenExpiresAt, locked, lockedUntilMs } = acc
      const now = Date.now()
      const iconText = providerId.slice(0, 2).toUpperCase()

      // Determine status
      let chipHtml = ''
      let cardClass = ''
      let actionHtml = ''

      if (!hasCredential) {
        cardClass = 'needs-auth'
        chipHtml = `<span class="chip info"><span class="dot"></span>NO AUTH</span>`
        actionHtml = `<button class="btn primary" onclick="startAuth('${esc(providerId)}','${esc(accountId)}')">Authorize</button>`
      } else if (tokenExpiresAt && tokenExpiresAt < now) {
        // Expired token
        cardClass = 'expired'
        chipHtml = `<span class="chip error"><span class="dot"></span>EXPIRED</span>`
        actionHtml = `<button class="btn" onclick="startAuth('${esc(providerId)}','${esc(accountId)}')">Re-authorize</button>`
      } else if (tokenExpiresAt && tokenExpiresAt < now + 3600000) {
        // Expiring within 1 hour
        const minsLeft = Math.max(0, Math.round((tokenExpiresAt - now) / 60000))
        chipHtml = `<span class="chip warn"><span class="dot"></span>EXPIRING ${minsLeft}m</span>`
        actionHtml = `<button class="btn" onclick="startAuth('${esc(providerId)}','${esc(accountId)}')">Authorize</button>`
      } else if (locked) {
        chipHtml = `<span class="chip warn"><span class="dot"></span>RATE LIMITED</span>`
        if (lockedUntilMs) {
          const secsLeft = Math.max(0, Math.ceil((lockedUntilMs - now) / 1000))
          chipHtml += ` <span style="font-size:0.63rem;color:var(--text-muted)">${secsLeft}s</span>`
        }
      } else if (!tokenExpiresAt && hasCredential) {
        // API key — no expiry
        chipHtml = `<span class="chip ok">
          <svg width="9" height="9" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="11" height="7" rx="1"/><path d="M5 7V5a2.5 2.5 0 015 0v2"/></svg>
          API KEY
        </span>`
      } else {
        // Active OAuth token
        chipHtml = `<span class="chip ok"><span class="dot"></span>ACTIVE</span>`
        actionHtml = `<button class="btn" style="font-size:0.65rem;padding:0.22rem 0.55rem" onclick="startAuth('${esc(providerId)}','${esc(accountId)}')">Re-auth</button>`
      }

      // Token detail line
      let detailText = `${providerId} / ${accountId}`
      if (tokenExpiresAt && tokenExpiresAt > now) {
        const hrs = Math.round((tokenExpiresAt - now) / 3600000)
        detailText += ` · expires in ${hrs}h`
      } else if (!tokenExpiresAt && hasCredential) {
        detailText += ' · static key'
      }

      html += `<div class="account-card${cardClass ? ' ' + cardClass : ''}">
        <div class="account-icon">${iconText}</div>
        <div class="account-info">
          <div class="account-name">${accountId}</div>
          <div class="account-detail">${detailText}</div>
        </div>
        <div class="account-actions">
          ${chipHtml}
          ${actionHtml}
        </div>
      </div>`
    }

    html += `</div>`
  }

  container.innerHTML = html
}

function esc(s) {
  return String(s).replace(/'/g, "\\'").replace(/</g, '&lt;')
}

// ── OAuth device flow ───────────────────────────────────────────────────────
async function startAuth(providerId, accountId) {
  const modal = document.getElementById('auth-modal')
  document.getElementById('auth-step').textContent = 'Starting device flow…'
  document.getElementById('auth-code-section').style.display = 'none'
  document.getElementById('auth-result').style.display = 'none'
  modal.classList.add('open')

  const r = await fetch('/dashboard/api/auth/start', {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify({ provider: providerId, accountId })
  })
  const d = await r.json()

  if (!r.ok) {
    document.getElementById('auth-step').textContent = '✗ ' + (d.error ?? 'Failed to start auth')
    return
  }

  currentAuth = {
    userCode: d.userCode,
    verificationUri: d.verificationUri,
    intervalMs: d.intervalMs ?? 5000
  }

  const uriEl = document.getElementById('auth-uri')
  uriEl.textContent = d.verificationUri
  uriEl.href = d.verificationUri
  document.getElementById('auth-code').textContent = d.userCode
  document.getElementById('auth-code-section').style.display = 'block'
  document.getElementById('auth-step').textContent = ''

  pollAuth()
}

async function pollAuth() {
  if (!currentAuth) return

  const r = await fetch(`/dashboard/api/auth/status/${encodeURIComponent(currentAuth.userCode)}`)
  const d = await r.json()

  if (d.status === 'success') {
    document.getElementById('auth-code-section').style.display = 'none'
    const res = document.getElementById('auth-result')
    res.style.display = 'block'
    res.style.color = 'var(--green)'
    res.textContent = '✓ AUTHORIZED'
    currentAuth = null
    setTimeout(() => {
      closeAuthModal()
      loadStatus()
    }, 2000)
    return
  }

  if (d.status === 'expired') {
    document.getElementById('auth-code-section').style.display = 'none'
    const res = document.getElementById('auth-result')
    res.style.display = 'block'
    res.style.color = 'var(--red)'
    res.textContent = '✗ CODE EXPIRED — Click Authorize to try again'
    currentAuth = null
    return
  }

  if (d.nextPollMs) currentAuth.intervalMs = d.nextPollMs
  setTimeout(pollAuth, currentAuth.intervalMs)
}

function cancelAuth() {
  if (currentAuth) {
    fetch(`/dashboard/api/auth/cancel/${encodeURIComponent(currentAuth.userCode)}`, {
      method: 'POST',
      headers: headers()
    }).catch(() => {})
    currentAuth = null
  }
  closeAuthModal()
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.remove('open')
  currentAuth = null
}

function copyAuthCode() {
  if (currentAuth) {
    navigator.clipboard.writeText(currentAuth.userCode).then(() => {
      showToast('Code copied!')
    }).catch(() => {
      showToast('Could not copy — enter it manually', true)
    })
  }
}

function openAuthUri() {
  if (currentAuth) window.open(currentAuth.verificationUri, '_blank')
}

// ── Shared utilities ────────────────────────────────────────────────────────
function getCsrfToken() { const m = document.cookie.match(/(?:^|;\s*)keyrouter_csrf=([^;]+)/); return m ? m[1] : '' }
function headers(extra = {}) { return { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken(), ...extra } }
function toggleDark() {
  const dark = document.documentElement.classList.toggle('dark')
  localStorage.setItem('dark', dark ? '1' : '0')
  document.getElementById('dark-toggle').textContent = dark ? '☀' : '☾'
}
if (localStorage.getItem('dark') === '0') { document.documentElement.classList.remove('dark'); const b = document.getElementById('dark-toggle'); if(b) b.textContent = '☾' }
let _tt; function showToast(msg, isError=false) { const el=document.getElementById('toast'); el.textContent=msg; el.className='show'+(isError?' error':''); clearTimeout(_tt); _tt=setTimeout(()=>{el.className=''},3500) }
async function logout() { await fetch('/dashboard/logout',{method:'POST',headers:headers()}); window.location.href='/dashboard/login' }

// ── Init ────────────────────────────────────────────────────────────────────
function init() {
  loadStatus()
}

init()
</script>
