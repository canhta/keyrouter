<!DOCTYPE html>
<html lang="en" id="html" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyrouter — Usage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161f; --surface-2: #1a1e2a; --surface-3: #222637;
      --border: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.12);
      --text: #dde1ed; --text-muted: #525870; --text-dim: #363b52;
      --accent: #f59e0b; --accent-dim: rgba(245,158,11,0.12); --accent-glow: rgba(245,158,11,0.25);
      --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --orange: #f97316; --orange-dim: rgba(249,115,22,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --radius: 6px; --radius-lg: 10px;
    }
    html:not(.dark) {
      --bg: #f0f0eb; --surface: #ffffff; --surface-2: #f7f7f3; --surface-3: #ededea;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.14);
      --text: #1a1c24; --text-muted: #8892a4; --text-dim: #bcc1cc;
      --accent: #d97706; --accent-dim: rgba(217,119,6,0.10); --accent-glow: rgba(217,119,6,0.20);
    }
    body { font-family: 'JetBrains Mono','Courier New',monospace; background: var(--bg); color: var(--text); font-size: 12.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); height: 48px; display: flex; align-items: center; padding: 0 1rem; flex-shrink: 0; z-index: 10; gap: 0; }
    .logo { display: flex; align-items: center; gap: 0.45rem; text-decoration: none; color: var(--text); flex-shrink: 0; margin-right: 1rem; }
    .logo-mark { width: 20px; height: 20px; background: var(--accent); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #000; }
    .logo-name { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; }
    nav { display: flex; align-items: stretch; height: 100%; flex: 1; }
    .nav-link { display: flex; align-items: center; gap: 0.3rem; padding: 0 0.75rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.03em; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-link svg { flex-shrink: 0; opacity: 0.7; }
    .nav-link.active svg { opacity: 1; }
    .hdr-actions { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .hdr-btn { border: 1px solid var(--border-mid); background: transparent; color: var(--text-muted); font-family: inherit; font-size: 0.68rem; font-weight: 500; padding: 0.28rem 0.6rem; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none; }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page { flex: 1; overflow-y: auto; padding: 2rem; max-width: 860px; width: 100%; margin: 0 auto; }
    .section-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; border: 1px solid var(--border-mid); background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 0.72rem; font-weight: 500; padding: 0.32rem 0.8rem; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
    .btn:hover:not(:disabled) { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn.primary:hover:not(:disabled) { opacity: 0.88; }
    .btn.danger:hover:not(:disabled) { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .chip { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.15rem 0.45rem; border-radius: 99px; border: 1px solid transparent; }
    .chip.ok { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .chip.warn { background: var(--orange-dim); color: var(--orange); border-color: rgba(249,115,22,0.2); }
    .chip.error { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.2); }
    .chip.info { background: var(--accent-dim); color: var(--accent); border-color: rgba(245,158,11,0.2); }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .chip.ok .dot { background: var(--green); }
    .chip.warn .dot { background: var(--orange); }
    .chip.error .dot { background: var(--red); }
    .chip.info .dot { background: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2.4s ease-in-out infinite; }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.45 } }
    .empty { color: var(--text-dim); font-size: 0.75rem; text-align: center; padding: 2rem; }
    .bar-wrap { height: 3px; background: var(--surface-3); border-radius: 2px; margin: 0.3rem 0; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
    .countdown { font-size: 0.7rem; color: var(--orange); font-weight: 600; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.78rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 200; max-width: 90vw; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    #toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }
    @media (max-width: 639px) { .page { padding: 1rem; } header { padding: 0 0.75rem; } .nav-label { display: none; } .logo-name { display: none; } }

    /* ── Usage-specific ── */
    .usage-row { margin-bottom: 1rem; }
    .usage-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.3rem; }
    .usage-model { font-weight: 600; font-size: 0.82rem; }
    .usage-stat { font-size: 0.7rem; color: var(--text-muted); }
    .usage-tokens { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.1rem; }
    .limits-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.85rem 1rem; margin-bottom: 0.5rem; }
    .limits-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .limits-name { font-size: 0.75rem; font-weight: 600; }
    .reset-at { font-size: 0.65rem; color: var(--text-muted); }
    .lock-card { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-lg); padding: 0.85rem 1rem; margin-bottom: 0.5rem; }
    .lock-header { display: flex; justify-content: space-between; align-items: center; }
    .lock-name { font-size: 0.75rem; font-weight: 600; color: var(--text); }
    .lock-until { font-size: 0.72rem; color: var(--red); font-weight: 600; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .page-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.04em; }
    .page-subtitle { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
  </style>
</head>
<body>

<header>
  <a href="/dashboard" class="logo">
    <span class="logo-mark">K</span>
    <span class="logo-name">KEYROUTER</span>
  </a>
  <nav>
    <a href="/dashboard" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 6.5L7.5 1L14 6.5V14H10V9.5H5V14H1V6.5Z" stroke-linejoin="round"/></svg>
      <span class="nav-label">Overview</span>
    </a>
    <a href="/dashboard/monitor" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,10 4,5 7,8.5 10,3 14,7"/></svg>
      <span class="nav-label">Monitor</span>
    </a>
    <a href="/dashboard/config" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="4" x2="14" y2="4"/><line x1="1" y1="11" x2="14" y2="11"/><circle cx="5" cy="4" r="2" fill="var(--bg)"/><circle cx="10" cy="11" r="2" fill="var(--bg)"/></svg>
      <span class="nav-label">Config</span>
    </a>
    <a href="/dashboard/auth" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="6" r="3"/><path d="M8 8.5L13.5 14M11.5 11L13 12.5"/></svg>
      <span class="nav-label">Auth</span>
    </a>
    <a href="/dashboard/usage" class="nav-link active">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="9" width="3" height="5"/><rect x="6" y="6" width="3" height="8"/><rect x="11" y="3" width="3" height="11"/></svg>
      <span class="nav-label">Usage</span>
    </a>
  </nav>
  <div class="hdr-actions">
    <a href="https://github.com/canhta/keyrouter" target="_blank" class="hdr-btn" title="Star us on GitHub" aria-label="GitHub">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <button class="hdr-btn" id="dark-toggle" onclick="toggleDark()">☀</button>
    <button class="hdr-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <div class="page-title">Usage</div>
      <div class="page-subtitle">Last 24 hours</div>
    </div>
    <span class="chip info">
      <span class="dot"></span>
      AUTO-REFRESH 10s
    </span>
  </div>

  <!-- By Model -->
  <div class="section-label">By Model</div>
  <div id="usage-list">
    <div class="empty">Loading...</div>
  </div>

  <div class="divider"></div>

  <!-- Rate Limits -->
  <div class="section-label">Rate Limits</div>
  <div id="locks-section"></div>
  <div id="limits-list"></div>

</div>

<div id="toast"></div>

<script>
  let _countdownInterval = null

  function fmtTokens(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k'
    return String(n)
  }

  function fmtDuration(ms) {
    if (ms <= 0) return 'now'
    const s = Math.ceil(ms / 1000)
    if (s < 60) return `${s}s`
    const m = Math.floor(s / 60), rem = s % 60
    if (m < 60) return `${m}m ${rem}s`
    const h = Math.floor(m / 60), remM = m % 60
    return `${h}h ${remM}m`
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  }

  function renderUsage(byModel) {
    const list = document.getElementById('usage-list')
    if (!byModel || byModel.length === 0) {
      list.innerHTML = '<div class="empty">No requests in the last 24 hours</div>'
      return
    }
    const maxReq = Math.max(...byModel.map(r => r.requests), 1)
    list.innerHTML = byModel.map(row => {
      const pct = Math.round((row.requests / maxReq) * 100)
      return `
        <div class="usage-row">
          <div class="usage-header">
            <span class="usage-model">${row.model}</span>
            <span class="usage-stat">${row.requests.toLocaleString()} req</span>
          </div>
          <div class="bar-wrap">
            <div class="bar-fill" style="width: ${pct}%"></div>
          </div>
          <div class="usage-tokens">${fmtTokens(row.tokens)} tokens</div>
        </div>
      `
    }).join('')
  }

  function renderLimits(accounts, providerLimits) {
    const locksSection = document.getElementById('locks-section')
    const limitsList = document.getElementById('limits-list')

    // Locked accounts
    const now = Date.now()
    const locked = Object.entries(accounts || {})
      .filter(([, a]) => a.lockedUntil && a.lockedUntil > now)
      .sort(([, a], [, b]) => a.lockedUntil - b.lockedUntil)

    if (locked.length === 0) {
      locksSection.innerHTML = '<div style="margin-bottom: 1rem;"><span class="chip ok"><span class="dot"></span>No active rate limits</span></div>'
    } else {
      locksSection.innerHTML = locked.map(([name, a]) => `
        <div class="lock-card">
          <div class="lock-header">
            <span class="lock-name">${name}</span>
            <span class="lock-until countdown" data-until="${a.lockedUntil}">
              locked · ${fmtDuration(a.lockedUntil - now)}
            </span>
          </div>
          ${a.lockedModel ? `<div style="font-size: 0.68rem; color: var(--text-muted); margin-top: 0.35rem;">model: ${a.lockedModel}</div>` : ''}
        </div>
      `).join('')
    }

    // Provider limits
    const limits = providerLimits || []
    if (limits.length === 0) {
      limitsList.innerHTML = '<div class="empty" style="padding: 1rem 0;">No provider limit data available</div>'
    } else {
      limitsList.innerHTML = limits.map(lim => {
        const reqPct = lim.requestLimit ? Math.round((lim.requestsUsed / lim.requestLimit) * 100) : 0
        const tokPct = lim.tokenLimit ? Math.round((lim.tokensUsed / lim.tokenLimit) * 100) : 0
        const reqBarClass = reqPct > 85 ? 'style="background: var(--red)"' : reqPct > 60 ? 'style="background: var(--orange)"' : ''
        const tokBarClass = tokPct > 85 ? 'style="background: var(--red)"' : tokPct > 60 ? 'style="background: var(--orange)"' : ''
        return `
          <div class="limits-card">
            <div class="limits-header">
              <span class="limits-name">${lim.account}</span>
              ${lim.resetsAt ? `<span class="reset-at">resets ${fmtTime(lim.resetsAt)}</span>` : ''}
            </div>
            ${lim.requestLimit ? `
              <div style="margin-bottom: 0.5rem;">
                <div style="display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.2rem;">
                  <span>Requests</span>
                  <span>${lim.requestsUsed.toLocaleString()} / ${lim.requestLimit.toLocaleString()}</span>
                </div>
                <div class="bar-wrap"><div class="bar-fill" ${reqBarClass} style="width: ${reqPct}%"></div></div>
              </div>
            ` : ''}
            ${lim.tokenLimit ? `
              <div>
                <div style="display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--text-muted); margin-bottom: 0.2rem;">
                  <span>Tokens</span>
                  <span>${fmtTokens(lim.tokensUsed)} / ${fmtTokens(lim.tokenLimit)}</span>
                </div>
                <div class="bar-wrap"><div class="bar-fill" ${tokBarClass} style="width: ${tokPct}%"></div></div>
              </div>
            ` : ''}
          </div>
        `
      }).join('')
    }

    startCountdowns()
  }

  function startCountdowns() {
    if (_countdownInterval) clearInterval(_countdownInterval)
    _countdownInterval = setInterval(() => {
      const els = document.querySelectorAll('.countdown[data-until]')
      const now = Date.now()
      els.forEach(el => {
        const until = parseInt(el.dataset.until, 10)
        const remaining = until - now
        if (remaining <= 0) {
          el.textContent = 'unlocking...'
        } else {
          el.textContent = `locked · ${fmtDuration(remaining)}`
        }
      })
    }, 1000)
  }

  async function loadData() {
    try {
      const [statusR, usageR] = await Promise.all([
        fetch('/dashboard/api/status'),
        fetch('/dashboard/api/usage')
      ])
      if (!statusR.ok || !usageR.ok) { showToast('Failed to load data', true); return }
      const status = await statusR.json()
      const usage = await usageR.json()
      renderUsage(usage.byModel)
      renderLimits(status.accounts, usage.providerLimits)
    } catch (e) {
      showToast('Network error', true)
    }
  }

  function updateDarkToggle() {
    const dark = document.documentElement.classList.contains('dark')
    const b = document.getElementById('dark-toggle'); if(b) b.textContent = dark ? '☀' : '☾'
  }

  function getCsrfToken() { const m = document.cookie.match(/(?:^|;\s*)keyrouter_csrf=([^;]+)/); return m ? m[1] : '' }
  function headers(extra = {}) { return { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken(), ...extra } }
  function toggleDark() {
    const dark = document.documentElement.classList.toggle('dark')
    localStorage.setItem('dark', dark ? '1' : '0')
    document.getElementById('dark-toggle').textContent = dark ? '☀' : '☾'
  }
  if (localStorage.getItem('dark') === '0') { document.documentElement.classList.remove('dark'); const b = document.getElementById('dark-toggle'); if(b) b.textContent = '☾' }
  let _tt; function showToast(msg, isError=false) { const el=document.getElementById('toast'); el.textContent=msg; el.className='show'+(isError?' error':''); clearTimeout(_tt); _tt=setTimeout(()=>{el.className=''},3500) }
  async function logout() { await fetch('/dashboard/logout',{method:'POST',headers:headers()}); window.location.href='/dashboard/login' }

  updateDarkToggle()
  loadData()
  setInterval(loadData, 10000)
</script>
</body>
</html>
