<!DOCTYPE html>
<html lang="en" id="html" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor — Keyrouter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #13161f; --surface-2: #1a1e2a; --surface-3: #222637;
      --border: rgba(255,255,255,0.07); --border-mid: rgba(255,255,255,0.12);
      --text: #dde1ed; --text-muted: #525870; --text-dim: #363b52;
      --accent: #f59e0b; --accent-dim: rgba(245,158,11,0.12); --accent-glow: rgba(245,158,11,0.25);
      --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
      --orange: #f97316; --orange-dim: rgba(249,115,22,0.12);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
      --radius: 6px; --radius-lg: 10px;
    }
    html:not(.dark) {
      --bg: #f0f0eb; --surface: #ffffff; --surface-2: #f7f7f3; --surface-3: #ededea;
      --border: rgba(0,0,0,0.08); --border-mid: rgba(0,0,0,0.14);
      --text: #1a1c24; --text-muted: #8892a4; --text-dim: #bcc1cc;
      --accent: #d97706; --accent-dim: rgba(217,119,6,0.10); --accent-glow: rgba(217,119,6,0.20);
    }
    body { font-family: 'JetBrains Mono','Courier New',monospace; background: var(--bg); color: var(--text); font-size: 12.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); height: 48px; display: flex; align-items: center; padding: 0 1rem; flex-shrink: 0; z-index: 10; gap: 0; }
    .logo { display: flex; align-items: center; gap: 0.45rem; text-decoration: none; color: var(--text); flex-shrink: 0; margin-right: 1rem; }
    .logo-mark { width: 20px; height: 20px; background: var(--accent); border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: #000; }
    .logo-name { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; }
    nav { display: flex; align-items: stretch; height: 100%; flex: 1; }
    .nav-link { display: flex; align-items: center; gap: 0.3rem; padding: 0 0.75rem; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.03em; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-link svg { flex-shrink: 0; opacity: 0.7; }
    .nav-link.active svg { opacity: 1; }
    [data-lucide] { display: inline-flex; align-items: center; justify-content: center; }
    .hdr-actions { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }
    .hdr-btn { border: 1px solid var(--border-mid); background: transparent; color: var(--text-muted); font-family: inherit; font-size: 0.68rem; font-weight: 500; padding: 0.28rem 0.6rem; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none; }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page { flex: 1; overflow-y: auto; padding: 2rem; max-width: 860px; width: 100%; margin: 0 auto; }
    .section-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
    .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; border: 1px solid var(--border-mid); background: var(--surface-2); color: var(--text); font-family: inherit; font-size: 0.72rem; font-weight: 500; padding: 0.32rem 0.8rem; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; text-decoration: none; white-space: nowrap; }
    .btn:hover:not(:disabled) { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn.primary:hover:not(:disabled) { opacity: 0.88; }
    .btn.danger:hover:not(:disabled) { background: var(--red-dim); border-color: var(--red); color: var(--red); }
    .chip { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.15rem 0.45rem; border-radius: 99px; border: 1px solid transparent; }
    .chip.ok { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .chip.warn { background: var(--orange-dim); color: var(--orange); border-color: rgba(249,115,22,0.2); }
    .chip.error { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.2); }
    .chip.info { background: var(--accent-dim); color: var(--accent); border-color: rgba(245,158,11,0.2); }
    .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .chip.ok .dot { background: var(--green); }
    .chip.warn .dot { background: var(--orange); }
    .chip.error .dot { background: var(--red); }
    .chip.info .dot { background: var(--accent); }
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border-mid); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 480px; width: 100%; box-shadow: 0 24px 64px rgba(0,0,0,0.5); animation: modal-in 0.18s ease; }
    @keyframes modal-in { from { opacity:0; transform:scale(0.96) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
    .modal-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .modal-code { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.25em; background: var(--accent-dim); border: 1px solid var(--accent-glow); border-radius: var(--radius); padding: 0.6rem 1rem; display: inline-block; color: var(--accent); margin: 0.4rem 0; }
    .field-group { margin-bottom: 0.85rem; }
    .field-group label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 0.3rem; }
    .field-group input { width: 100%; background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: var(--radius); color: var(--text); padding: 0.5rem 0.75rem; font-family: inherit; font-size: 0.8rem; transition: border-color 0.15s; }
    .field-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .field-group input::placeholder { color: var(--text-dim); }
    .field-error { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius); padding: 0.45rem 0.7rem; font-size: 0.75rem; color: var(--red); }
    .empty { color: var(--text-dim); font-size: 0.75rem; text-align: center; padding: 2rem; }
    .btn-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem; }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(8px); background: var(--surface); border: 1px solid var(--border-mid); border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.78rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 200; max-width: 90vw; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    #toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }
    @media (max-width: 639px) { .page { padding: 1rem; } header { padding: 0 0.75rem; } .nav-label { display: none; } .logo-name { display: none; } }

    /* Monitor-specific */
    body { overflow: hidden; }
    .toolbar { height: 44px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; padding: 0 1rem; }
    .counter { display: flex; align-items: center; gap: 0.35rem; font-size: 0.68rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 99px; border: 1px solid transparent; }
    .counter.c200 { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.2); }
    .counter.c429 { background: var(--orange-dim); color: var(--orange); border-color: rgba(249,115,22,0.2); }
    .counter.c5xx { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.2); }
    .filter-select { background: var(--surface-2); border: 1px solid var(--border-mid); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 0.68rem; padding: 0.22rem 0.5rem; cursor: pointer; }
    .filter-select option { background: var(--surface); }
    .sse-status { margin-left: auto; font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem; }
    .sse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .sse-dot.reconnecting { background: var(--orange); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #log-area { flex: 1; overflow-y: auto; }
    .log-line { display: grid; grid-template-columns: 58px 110px 130px 40px auto; gap: 0.5rem; padding: 0.22rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; align-items: center; transition: background 0.1s; }
    .log-line:hover { background: var(--surface-2); }
    .log-line.l200 .log-status { color: var(--green); }
    .log-line.l429 .log-status { color: var(--orange); }
    .log-line.l5xx { background: rgba(239,68,68,0.03); }
    .log-line.l5xx .log-status { color: var(--red); }
    .log-model { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
    .log-account { overflow: hidden; text-overflow: ellipsis; }
    .log-meta { overflow: hidden; text-overflow: ellipsis; }
    .log-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0.5rem; color: var(--text-dim); }
    .log-empty svg { opacity: 0.3; }
    @media (max-width: 639px) {
      .log-line { grid-template-columns: 50px 90px 1fr 36px; }
      .log-meta { display: none; }
      .filter-label { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/dashboard" class="logo">
      <span class="logo-mark">K</span>
      <span class="logo-name">KEYROUTER</span>
    </a>
    <nav>
      <a href="/dashboard" class="nav-link">
        <i data-lucide="layout-dashboard" style="width:14px;height:14px;flex-shrink:0"></i>
        <span class="nav-label">Overview</span>
      </a>
      <a href="/dashboard/monitor" class="nav-link active">
        <i data-lucide="activity" style="width:14px;height:14px;flex-shrink:0"></i>
        <span class="nav-label">Monitor</span>
      </a>
      <a href="/dashboard/config" class="nav-link">
        <i data-lucide="sliders-horizontal" style="width:14px;height:14px;flex-shrink:0"></i>
        <span class="nav-label">Config</span>
      </a>
      <a href="/dashboard/auth" class="nav-link">
        <i data-lucide="key" style="width:14px;height:14px;flex-shrink:0"></i>
        <span class="nav-label">Auth</span>
      </a>
      <a href="/dashboard/usage" class="nav-link">
        <i data-lucide="bar-chart-2" style="width:14px;height:14px;flex-shrink:0"></i>
        <span class="nav-label">Usage</span>
      </a>
    </nav>
    <div class="hdr-actions">
      <a href="https://github.com/canhta/keyrouter" target="_blank" class="hdr-btn" title="Star us on GitHub" aria-label="GitHub">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <button class="hdr-btn" id="dark-toggle" onclick="toggleDark()">☀</button>
      <button class="hdr-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="counter c200"><span id="cnt200">0</span>&nbsp;2xx</span>
    <span class="counter c429"><span id="cnt429">0</span>&nbsp;429</span>
    <span class="counter c5xx"><span id="cnt5xx">0</span>&nbsp;5xx</span>
    <span style="width:1px;height:20px;background:var(--border);margin:0 0.25rem"></span>
    <span class="filter-label" style="font-size:0.65rem;color:var(--text-muted)">Filter:</span>
    <select class="filter-select" id="filter-model" onchange="applyFilter()"><option value="">All models</option></select>
    <select class="filter-select" id="filter-status" onchange="applyFilter()">
      <option value="">All statuses</option>
      <option value="200">2xx OK</option>
      <option value="429">429 Rate limit</option>
      <option value="5xx">5xx Error</option>
    </select>
    <button class="hdr-btn" onclick="clearLog()" style="margin-left:auto"><i data-lucide="trash-2" style="width:12px;height:12px"></i> Clear</button>
    <div class="sse-status"><span class="sse-dot" id="sse-dot"></span><span id="sse-text">LIVE</span></div>
  </div>

  <div id="log-area">
    <div class="log-empty" id="log-empty">
      <svg width="32" height="32" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1"><polyline points="1,10 4,5 7,8.5 10,3 14,7"/></svg>
      <span>Waiting for requests…</span>
    </div>
  </div>

  <div id="toast"></div>

<script>
// Initialize Lucide icons immediately
if (typeof lucide !== 'undefined') lucide.createIcons()
// ── State ───────────────────────────────────────────────────────────────────
const logs = []
let filterModel = ''
let filterStatus = ''
let cnt200 = 0, cnt429 = 0, cnt5xx = 0

// ── SSE ─────────────────────────────────────────────────────────────────────
const es = new EventSource('/dashboard/events')

es.onopen = () => {
  const dot = document.getElementById('sse-dot')
  const txt = document.getElementById('sse-text')
  dot.classList.remove('reconnecting')
  txt.textContent = 'LIVE'
}

es.onerror = () => {
  const dot = document.getElementById('sse-dot')
  const txt = document.getElementById('sse-text')
  dot.classList.add('reconnecting')
  txt.textContent = 'RECONNECTING…'
}

es.onmessage = (e) => {
  const event = JSON.parse(e.data)
  if (event.type === 'request') {
    addLog(event.data)
  } else if (event.type === 'lock') {
    addLog({
      time: new Date().toTimeString().slice(0, 8),
      model: event.data.model ?? '—',
      account: event.data.account ?? '—',
      provider: '—',
      status: 429,
      latencyMs: 0,
      tokens: 0
    })
  } else if (event.type === 'config') {
    if (event.data && Array.isArray(event.data.models)) {
      populateModelFilter(event.data.models)
    }
  }
}

// ── Log management ──────────────────────────────────────────────────────────
function addLog(data) {
  const entry = {
    time: data.time ?? new Date().toTimeString().slice(0, 8),
    model: data.model ?? '—',
    account: data.account ?? '—',
    provider: data.provider ?? '—',
    status: data.status ?? 0,
    latencyMs: data.latencyMs ?? 0,
    tokens: data.tokens ?? 0
  }
  logs.push(entry)

  // Update counters
  const s = entry.status
  if (s >= 500) { cnt5xx++; document.getElementById('cnt5xx').textContent = cnt5xx }
  else if (s === 429) { cnt429++; document.getElementById('cnt429').textContent = cnt429 }
  else if (s >= 200 && s < 300) { cnt200++; document.getElementById('cnt200').textContent = cnt200 }

  renderFiltered()
}

function statusClass(status) {
  if (status >= 500) return 'l5xx'
  if (status === 429) return 'l429'
  return 'l200'
}

function matchesFilter(entry) {
  if (filterModel && entry.model !== filterModel) return false
  if (filterStatus) {
    if (filterStatus === '200' && !(entry.status >= 200 && entry.status < 300)) return false
    if (filterStatus === '429' && entry.status !== 429) return false
    if (filterStatus === '5xx' && entry.status < 500) return false
  }
  return true
}

function renderFiltered() {
  const filtered = logs.filter(matchesFilter)
  const slice = filtered.slice(-500)

  const area = document.getElementById('log-area')
  const emptyEl = document.getElementById('log-empty')

  if (slice.length === 0) {
    area.innerHTML = ''
    area.appendChild(emptyEl)
    emptyEl.style.display = 'flex'
    return
  }

  emptyEl.style.display = 'none'

  // Build HTML for all lines (newest at top)
  let html = ''
  for (let i = slice.length - 1; i >= 0; i--) {
    const e = slice[i]
    const cls = statusClass(e.status)
    const accountStr = e.provider !== '—' ? `${e.provider}/${e.account}` : e.account
    html += `<div class="log-line ${cls}">` +
      `<span>${e.time}</span>` +
      `<span class="log-model">${e.model}</span>` +
      `<span class="log-account">${accountStr}</span>` +
      `<span class="log-status">${e.status}</span>` +
      `<span class="log-meta">${e.latencyMs}ms ${e.tokens}tok</span>` +
      `</div>`
  }

  area.innerHTML = html
}

function applyFilter() {
  filterModel = document.getElementById('filter-model').value
  filterStatus = document.getElementById('filter-status').value
  renderFiltered()
}

function clearLog() {
  logs.length = 0
  cnt200 = 0; cnt429 = 0; cnt5xx = 0
  document.getElementById('cnt200').textContent = '0'
  document.getElementById('cnt429').textContent = '0'
  document.getElementById('cnt5xx').textContent = '0'
  renderFiltered()
}

function populateModelFilter(models) {
  const sel = document.getElementById('filter-model')
  const current = sel.value
  // Keep the "All models" option, rebuild the rest
  sel.innerHTML = '<option value="">All models</option>'
  const ids = Array.isArray(models) ? models.map(m => (typeof m === 'string' ? m : m.id)).filter(Boolean) : []
  const seen = new Set()
  for (const id of ids) {
    if (seen.has(id)) continue
    seen.add(id)
    const opt = document.createElement('option')
    opt.value = id
    opt.textContent = id
    if (id === current) opt.selected = true
    sel.appendChild(opt)
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/dashboard/api/status')
    if (r.ok) {
      const d = await r.json()
      if (d.models) populateModelFilter(d.models)
    }
  } catch (_) {}
}

// ── Shared utilities ────────────────────────────────────────────────────────
function getCsrfToken() { const m = document.cookie.match(/(?:^|;\s*)keyrouter_csrf=([^;]+)/); return m ? m[1] : '' }
function headers(extra = {}) { return { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken(), ...extra } }
function toggleDark() {
  const dark = document.documentElement.classList.toggle('dark')
  localStorage.setItem('dark', dark ? '1' : '0')
  document.getElementById('dark-toggle').textContent = dark ? '☀' : '☾'
}
if (localStorage.getItem('dark') === '0') { document.documentElement.classList.remove('dark'); const b = document.getElementById('dark-toggle'); if(b) b.textContent = '☾' }
let _tt; function showToast(msg, isError=false) { const el=document.getElementById('toast'); el.textContent=msg; el.className='show'+(isError?' error':''); clearTimeout(_tt); _tt=setTimeout(()=>{el.className=''},3500) }
async function logout() { await fetch('/dashboard/logout',{method:'POST',headers:headers()}); window.location.href='/dashboard/login' }

init()
</script>
</body>
</html>
